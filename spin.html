<!DOCTYPE html>
<html>

<head>

<title>Lucky Spin | Faraz Store</title>

<link rel="stylesheet" href="css/spin.css">

</head>


<body>


<div class="spin-container">


<h1>🎡 Faraz Lucky Spin</h1>

<div class="wheel-wrapper">


<div class="pointer">
▼
</div>


<div id="wheel">


<div class="wheel-text t1">₹50 OFF</div>

<div class="wheel-text t2">20 POINTS</div>

<div class="wheel-text t3">FREE DELIVERY</div>

<div class="wheel-text t4">₹30 OFF</div>

<div class="wheel-text t5">TRY AGAIN</div>

<div class="wheel-text t6">₹10 OFF</div>



<div class="center-logo">

FARAZ<br>
<span>STORE</span>

</div>


</div>


</div>


<button id="spin">

🎡 SPIN NOW

</button>
<audio id="spin-sound" src="sounds/spin.mp3"></audio>


<h2 id="result"></h2>


<p id="coupon-result"></p>


<div id="timer"></div>


</div>



<script type="module" src="js/spin.js"></script>

<div id="reward-popup">

<div class="reward-card">

<div class="reward-icon">
🎉
</div>

<h1>Congratulations!</h1>

<h2 id="popup-reward"></h2>

<p id="popup-code"></p>


<button id="close-popup">
OK</button>


</div>

</div>
</body>

</html>
