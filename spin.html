<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 Lucky Spin Wheel | Faraz Store</title>
    <meta name="description" content="Spin the lucky wheel and win discount coupons & reward points on Faraz Store!">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">

    <!-- CSS Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/spin.css">
</head>

<body class="spin-page-bg">

    <div class="spin-container glassmorphism">
        
        <!-- HEADER BAR -->
        <div class="spin-header">
            <button class="nav-btn-back" onclick="location.href='index.html'">← Back to Shop</button>
            <h1 class="spin-title">🎡 FARAZ LUCKY SPIN</h1>
        </div>

        <!-- SPIN WHEEL WRAPPER -->
        <div class="wheel-wrapper">
            <div class="pointer">▼</div>

            <div id="wheel">
                <div class="wheel-text t1">₹50 OFF</div>
                <div class="wheel-text t2">20 POINTS</div>
                <div class="wheel-text t3">FREE DELIVERY</div>
                <div class="wheel-text t4">₹30 OFF</div>
                <div class="wheel-text t5">TRY AGAIN</div>
                <div class="wheel-text t6">₹10 OFF</div>

                <div class="center-logo">
                    FARAZ<br>
                    <span>STORE</span>
                </div>
            </div>
        </div>

        <!-- ACTION BUTTON & AUDIO -->
        <button id="spin" class="spin-trigger-btn">
            🎡 SPIN NOW
        </button>
        <audio id="spin-sound" src="sounds/spin.mp3"></audio>

        <!-- RESULT & TIMER DISPLAY -->
        <h2 id="result" class="spin-result-text"></h2>
        <p id="coupon-result" class="spin-coupon-code"></p>
        <div id="timer" class="spin-cooldown-timer"></div>

    </div>

    <!-- REWARD CONGRATULATIONS POPUP MODAL -->
    <div id="reward-popup" class="modal-overlay" style="display: none;">
        <div class="reward-card glassmorphism">
            <div class="reward-icon">🎉</div>
            <h1 class="reward-title">Congratulations!</h1>
            <h2 id="popup-reward" class="reward-highlight"></h2>
            <p id="popup-code" class="reward-code-box"></p>
            <button id="close-popup" class="reward-close-btn">OK, CLAIM NOW</button>
        </div>
    </div>

    <!-- SCRIPT INTEGRATION -->
    <script type="module" src="js/spin.js"></script>

</body>

</html>
