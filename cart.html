<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Faraz Store</title>
    <meta name="description" content="View and manage items in your Faraz Store cart.">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

    <!-- CSS Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- 🚀 HEADER -->
    <header class="header">
        <div class="logo-area">
            <a href="index.html" class="logo">
                <span>🔥</span> FARAZ <span class="gradient-text">STORE</span>
            </a>
        </div>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="tracking.html">Tracking</a>
            <a href="orders.html">Orders</a>
        </nav>

        <div class="header-buttons">
            <button onclick="location.href='index.html'" title="Home">🏠</button>
            <button onclick="location.href='wishlist.html'" title="Wishlist">❤️</button>
            <button onclick="location.href='profile.html'" title="Profile">👤</button>
        </div>
    </header>

    <!-- 🛒 CART SECTION -->
    <section class="cart-section">
        <h1>🛒 My Shopping Cart</h1>

        <div id="cart-container" class="glassmorphism" style="padding: 20px; border-radius: 20px; margin-bottom: 25px;">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading Cart Items...</p>
            </div>
        </div>

        <div class="cart-total glassmorphism" style="padding: 25px; border-radius: 20px; text-align: center;">
            <h2 id="total-price" style="color: #ffcc00; font-size: 24px; margin-bottom: 20px;">Total : ₹0</h2>
            <button class="checkout-btn primary-btn" onclick="location.href='checkout.html'" style="font-size: 16px; padding: 14px 35px;">
                Proceed To Checkout 🚀
            </button>
        </div>
    </section>

    <!-- 🛑 FOOTER -->
    <footer class="footer">
        <h2>🔥 FARAZ STORE</h2>
        <p>Gaming + Smart Shopping Experience</p>
        <p class="copy">© 2026 Faraz Store. All Rights Reserved.</p>
    </footer>

    <!-- SCRIPT MODULE -->
    <script type="module" src="js/cart-page.js"></script>

</body>

</html>
