<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Faraz Store</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            FARAZ <span>STORE</span>
        </div>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="product.html">Products</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="tracking.html">Tracking</a>
            <a href="contact.html">Contact</a>
            <a href="orders.html">Orders</a>
        </nav>

        <div class="header-buttons">
            <button onclick="location.href='index.html'">🏠</button>
            <button onclick="location.href='wishlist.html'">❤️</button>
            <button onclick="location.href='login.html'">👤</button>
        </div>
    </header>

    <!-- CART SECTION -->
    <section class="cart-section">
        <h1>🛒 My Cart</h1>

        <div id="cart-container">
            <h2>Loading Cart...</h2>
        </div>

        <div class="cart-total">
            <!-- Coupon box has been entirely removed from this block -->
            <h2 id="total-price">Total : ₹0</h2>
            <button class="checkout-btn" onclick="location.href='checkout.html'">
                Proceed To Checkout
            </button>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <h2>FARAZ STORE</h2>
        <p>Gaming + Shopping Experience</p>
        <p class="copy">© 2026 Faraz Store. All Rights Reserved.</p>
    </footer>

    <!-- MODULE SCRIPTS INJECTION -->
    <script type="module" src="js/cart-page.js"></script>

</body>
</html>
