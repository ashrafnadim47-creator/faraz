<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders & Stats | Faraz Store</title>
    <meta name="description" content="Faraz Store Live Order Tracking and Sales Management Panel">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

    <!-- CSS Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin-product.css">
</head>

<body class="admin-page-bg">

    <div class="admin-container glassmorphism" style="max-width: 1100px; margin: 30px auto; padding: 25px; border-radius: 24px;">

        <!-- 👑 HEADER -->
        <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255, 255, 255, 0.15); padding-bottom: 18px; margin-bottom: 25px;">
            <div>
                <h1 style="font-family: 'Orbitron', sans-serif; font-size: 24px; color: #00e5ff; margin: 0;">👑 Faraz Store Admin Panel</h1>
                <p style="color: #94a3b8; font-size: 13px; margin-top: 4px;">Live order management and store analytics</p>
            </div>

            <div class="admin-buttons" style="display: flex; gap: 12px;">
                <a href="index.html" class="nav-btn-back" style="text-decoration: none; padding: 10px 18px; border-radius: 12px; font-weight: 800;">🏠 Home Shop</a>
                <button class="admin-logout-btn" onclick="logout()" style="background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer;">🚪 Logout</button>
            </div>
        </header>

        <!-- 📊 STATS CARDS GRID -->
        <div class="dashboard" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px;">

            <div class="stat-box glassmorphism" style="padding: 20px; text-align: center; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08);">
                <h2 style="font-size: 13px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase;">📦 Total Orders</h2>
                <h1 id="totalOrders" style="font-family: 'Orbitron', sans-serif; font-size: 26px; color: #38bdf8; margin: 0;">0</h1>
            </div>

            <div class="stat-box glassmorphism" style="padding: 20px; text-align: center; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08);">
                <h2 style="font-size: 13px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase;">💰 Total Sales</h2>
                <h1 id="totalSales" style="font-family: 'Orbitron', sans-serif; font-size: 26px; color: #ffcc00; margin: 0;">₹0</h1>
            </div>

            <div class="stat-box glassmorphism" style="padding: 20px; text-align: center; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08);">
                <h2 style="font-size: 13px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase;">🟡 Processing</h2>
                <h1 id="processingOrders" style="font-family: 'Orbitron', sans-serif; font-size: 26px; color: #eab308; margin: 0;">0</h1>
            </div>

            <div class="stat-box glassmorphism" style="padding: 20px; text-align: center; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08);">
                <h2 style="font-size: 13px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase;">🟢 Delivered</h2>
                <h1 id="deliveredOrders" style="font-family: 'Orbitron', sans-serif; font-size: 26px; color: #22c55e; margin: 0;">0</h1>
            </div>

        </div>

        <!-- 🛒 ORDERS CONTAINER -->
        <h2 style="font-size: 18px; color: #ffffff; margin-bottom: 16px;">📦 Store Orders Stream</h2>
        <div id="adminOrders" style="display: flex; flex-direction: column; gap: 14px;">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading Live Orders Database...</p>
            </div>
        </div>

    </div>

    <!-- SCRIPT MODULE -->
    <script type="module" src="admin.js"></script>

</body>

</html>
