<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Faraz Store</title>
    <!-- CSS wrapper connection path active status -->
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

    <!-- Premium Fullscreen Matrix Wrapper -->
    <section class="admin-login-page">
        
        <div class="admin-login-card">
            <div class="admin-login-header">
                <h1>🔐 FARAZ <span>STORE</span></h1>
                <p>ADMIN PANEL CONTROL DASHBOARD</p>
            </div>

            <!-- Input Controls Form Fields -->
            <div class="admin-input-group">
                <label for="admin-email">Admin Email Address</label>
                <input id="admin-email" type="email" placeholder="name@farazstore.com" autocomplete="off">
            </div>

            <div class="admin-input-group">
                <label for="admin-password">Secure Access Key</label>
                <input id="admin-password" type="password" placeholder="••••••••">
            </div>

            <!-- Full-width Action Submit Trigger Element -->
            <button id="admin-login-btn" class="admin-submit-btn">
                Authorize & Login
            </button>

            <a href="index.html" class="admin-back-shop-link">← Return to Public Storefront</a>
        </div>

    </section>

    <!-- Script loading tracking system links -->
    <script type="module" src="js/admin-login.js"></script>

</body>
</html>
