<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account Profile | Faraz Store</title>
    <meta name="description" content="View your account details, wallet, diamonds, and orders at Faraz Store.">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

    <!-- CSS Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="profile-page-bg">

    <section class="profile-section">

        <div class="profile-card glassmorphism" style="position: relative; padding: 35px 25px; border-radius: 24px; max-width: 500px; width: 100%; margin: auto; text-align: center;">
            
            <!-- Logout Action Button -->
            <button id="logout-btn" class="logout-btn-top" style="position: absolute; top: 20px; right: 20px; background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; padding: 6px 14px; border-radius: 20px; font-weight: bold; cursor: pointer;">
                🚪 Logout
            </button>

            <!-- User Avatar & Details -->
            <div class="profile-icon-wrapper" style="font-size: 55px; margin-bottom: 10px;">
                👤
            </div>

            <h1 id="user-name" style="font-size: 24px; color: #ffffff; margin-bottom: 4px;">Loading Account...</h1>
            <p id="user-email" style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;"></p>

            <!-- 4-CARD STATS GRID -->
            <div class="profile-info-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 25px;">
                
                <div class="info-node glassmorphism" style="padding: 15px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
                    <span style="font-size: 12px; color: #94a3b8; font-weight: 700;">📦 Orders</span>
                    <h3 id="order-count" style="font-size: 22px; color: #38bdf8; margin-top: 4px;">0</h3>
                </div>

                <div class="info-node glassmorphism" style="padding: 15px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
                    <span style="font-size: 12px; color: #94a3b8; font-weight: 700;">⭐ Points</span>
                    <h3 id="user-points" style="font-size: 22px; color: #ffcc00; margin-top: 4px;">0</h3>
                </div>

                <div class="info-node glassmorphism" style="padding: 15px; border-radius: 16px; border: 1px solid #00e5ff; background: rgba(0, 229, 255, 0.05);">
                    <span style="font-size: 12px; color: #00e5ff; font-weight: 700;">💎 Diamonds</span>
                    <h3 id="profile-diamonds" style="font-size: 22px; color: #00e5ff; margin-top: 4px;">0</h3>
                </div>

                <div class="info-node glassmorphism" style="padding: 15px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
                    <span style="font-size: 12px; color: #94a3b8; font-weight: 700;">❤️ Wishlist</span>
                    <h3 id="wish-count" style="font-size: 22px; color: #ff0055; margin-top: 4px;">0</h3>
                </div>

            </div>

            <!-- ACTION BUTTONS -->
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="primary-btn" onclick="location.href='orders.html'" style="width: 100%; font-size: 15px; padding: 12px;">
                    📦 View My Orders
                </button>

                <button class="order-btn" onclick="location.href='index.html'" style="width: 100%; font-size: 15px; padding: 12px; background: #1e293b; border: 1px solid #334155;">
                    🏠 Continue Shopping
                </button>
                <!-- PROFILE PAGE VIP CARD -->
<div class="profile-vip-card" style="background: rgba(255, 183, 0, 0.1); border: 1px solid #ffcc00; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center;">
    <h3 style="color: #ffcc00; margin-bottom: 5px;">👑 Free Fire Prime System</h3>
    <p style="font-size: 12px; color: #cbd5e1; margin-bottom: 10px;">Check your VIP Level & Unlockable Rewards</p>
    
    <a href="prime-membership.html" style="display: inline-block; background: linear-gradient(135deg, #ff8800, #ffe600); color: #000; padding: 8px 18px; border-radius: 8px; font-weight: 900; text-decoration: none;">
        VIEW MY PRIME LEVEL &raquo;
    </a>
</div>
            </div>

        </div>

    </section>

    <!-- SCRIPT MODULE -->
    <script type="module" src="js/profile.js"></script>

</body>

</html>
