<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Luck Royale & Ring Events | Faraz Store</title>
    <meta name="description" content="Spin the wheel, collect tokens, and win exclusive prizes in Faraz Store Luck Royale!">
    <meta name="theme-color" content="#03000a">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">

    <!-- CSS Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/luck-royale.css">
</head>

<body>

    <!-- 🎮 MAIN FREE FIRE STYLE ARENA WRAPPER -->
    <div class="ff-interface-wrapper">
        
        <!-- 👈 LEFT NAVIGATION PANEL -->
        <aside class="ff-navigation-panel">
            <div class="ff-panel-title">🎰 LUCK ROYALE</div>
            
            <div class="ff-menu-list">
                <div class="ff-menu-item active" data-event="mystical-ring">
                    <span class="ff-item-indicator"></span>
                    <span>🔮 MYSTICAL RING</span>
                </div>
                <div class="ff-menu-item" data-event="wall-royale">
                    <span class="ff-item-indicator"></span>
                    <span>🛡️ GLOO WALL STORE</span>
                </div>
                <div class="ff-menu-item" data-event="diwali-ring">
                    <span class="ff-item-indicator"></span>
                    <span>🪔 DIWALI RING</span>
                </div>
                <div class="ff-menu-item faded-link-tab" data-url="topup.html">
                    <span class="ff-item-indicator"></span>
                    <span>💎 BUY DIAMONDS</span>
                </div>
            </div>

            <!-- TOKEN BALANCE BOX -->
            <div class="token-status-box">
                <img src="images/token.png" alt="Token">
                <div>
                    <div style="font-size: 10px; color: #94a3b8; font-family: sans-serif;">TOKENS</div>
                    <span id="user-token-balance" style="color: #eab308; font-weight: bold;">0</span>
                </div>
            </div>

            <button id="open-exchange-btn" class="ff-exchange-trigger-btn">
                🛍️ EXCHANGE STORE
            </button>

            <button class="ff-close-gate" onclick="location.href='index.html'">
                🏠 EXIT ARENA
            </button>
        </aside>

        <!-- 🎯 CENTER MAIN SPIN ARENA -->
        <main class="ff-main-stage">
            <h1 id="event-title-display" class="ff-stage-title">MYSTICAL RING</h1>

            <!-- CIRCULAR WHEEL ARENA -->
            <div class="ff-circle-arena">
                <div id="wheel-slots-grid" class="ff-slots-container">
                    <!-- Dynamic Wheel Slots Rendered via JS -->
                </div>
                <div class="ff-center-hub">
                    <span>🎰</span>
                </div>
            </div>

            <!-- ACTION CONTROL DECK (SPIN BUTTONS) -->
            <div class="ff-action-deck">
                <button id="btn-spin-1" class="ff-deck-btn normal-spin">
                    <span class="btn-primary-text">1 SPIN</span>
                    <span class="btn-sub-text">💎 10 Diamonds</span>
                </button>
                <button id="btn-spin-10" class="ff-deck-btn grand-spin">
                    <span class="btn-primary-text">10 SPINS</span>
                    <span class="btn-sub-text">💎 100 Diamonds</span>
                </button>
            </div>
        </main>

        <!-- 👉 RIGHT COLUMN ITEM SHOWCASE CARD -->
        <aside class="ff-right-panel">
            <div id="right-column-prizes" class="right-showcase-container">
                <!-- Selected / Highlighted Prize Rendered via JS -->
            </div>
        </aside>

    </div>

    <!-- 🛍️ TOKEN EXCHANGE STORE MODAL POPUP -->
    <div id="exchange-modal" class="royale-modal-overlay" style="display: none;">
        <div class="exchange-fullscreen-card">
            <div class="exchange-top-bar">
                <div class="ex-title">👑 PREMIUM TOKEN EXCHANGE STORE</div>
                <div class="ex-wallet">
                    <img src="images/token.png" alt="Token">
                    <span id="exchange-wallet-tokens">0</span> Tokens
                </div>
                <button id="close-exchange-btn" class="ex-close-cross">✖</button>
            </div>

            <div class="exchange-main-body">
                <!-- SIDE CATEGORY TABS -->
                <div class="exchange-side-nav">
                    <button class="ex-nav-btn active" data-shop="grand">🏆 GRAND REWARDS</button>
                    <button class="ex-nav-btn" data-shop="crates">📦 LOOT CRATES</button>
                </div>

                <!-- ITEMS DISPLAY GRID -->
                <div id="exchange-items-renderer" class="exchange-content-grid">
                    <!-- Dynamic Exchange Catalog Rendered via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- 🎉 CONGRATULATIONS POPUP MODAL -->
    <div id="congratulations-popup" class="congratulations-overlay" style="display: none;">
        <div class="congrats-card">
            <h1 class="congrats-banner">CONGRATULATIONS!</h1>
            <p class="congrats-sub">YOU UNLOCKED A NEW REWARD</p>

            <div class="unlocked-reward-display">
                <img id="congrats-item-img" src="images/iphone16.png" alt="Prize">
                <h2 id="congrats-item-name">iPhone 16 Pro Max</h2>
            </div>

            <button id="congrats-dismiss-bstn" class="congrats-close-btn">CLAIM NOW</button>
        </div>
    </div>

    <!-- SCRIPT INTEGRATION -->
    <script type="module" src="js/luck-royale.js"></script>
</body>

</html>
