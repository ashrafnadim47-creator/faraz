<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product | Faraz Store Admin</title>
    <meta name="description" content="Add new items to Faraz Store product inventory.">
    <meta name="theme-color" content="#020617">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

    <!-- CSS Links -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin-add-product.css">
</head>

<body class="admin-page-bg">

    <div class="admin-box glassmorphism" style="max-width: 600px; margin: 30px auto; padding: 30px 20px; border-radius: 24px;">

        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255, 255, 255, 0.15); padding-bottom: 15px; margin-bottom: 25px;">
            <div>
                <h1 style="font-family: 'Orbitron', sans-serif; font-size: 22px; color: #00e5ff; margin: 0;">➕ Add New Product</h1>
                <p style="color: #94a3b8; font-size: 13px; margin-top: 4px;">Publish a new item to store catalog</p>
            </div>
            <button class="nav-btn-back" onclick="location.href='admin-products.html'">← Back</button>
        </header>

        <div class="form-box" style="display: flex; flex-direction: column; gap: 14px;">

            <div>
                <label style="font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">PRODUCT NAME</label>
                <input id="name" type="text" placeholder="Product Name" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: #ffffff; outline: none;">
            </div>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                <div>
                    <label style="font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">PRICE (₹)</label>
                    <input id="price" type="number" placeholder="Price (₹)" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: #ffffff; outline: none;">
                </div>
                <div>
                    <label style="font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">INITIAL STOCK</label>
                    <input id="stock" type="number" placeholder="Available Stock" min="0" value="0" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: #ffffff; outline: none;">
                </div>
            </div>

            <div>
                <label style="font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">CATEGORY</label>
                <input id="category" type="text" placeholder="Category (e.g. Gaming, Electronics, Accessories)" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: #ffffff; outline: none;">
            </div>

            <div>
                <label style="font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">IMAGE URL</label>
                <input id="image" type="text" placeholder="https://example.com/image.jpg" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: #ffffff; outline: none;">
            </div>

            <div>
                <label style="font-size: 12px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">PRODUCT DESCRIPTION</label>
                <textarea id="description" placeholder="Product Description..." rows="4" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #020617; color: #ffffff; outline: none; resize: vertical;"></textarea>
            </div>

            <button id="add-product" class="primary-btn" style="padding: 14px; font-size: 15px; font-weight: 800; border-radius: 12px; margin-top: 10px;">
                ➕ Add Product To Store
            </button>

            <p id="message" style="text-align: center; font-size: 13px; font-weight: 800; min-height: 20px;"></p>

        </div>

    </div>

    <!-- SCRIPT MODULE -->
    <script type="module" src="js/admin-add-product.js"></script>

</body>

</html>
