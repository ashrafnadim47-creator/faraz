<!DOCTYPE html>
<html>

<head>

<title>Add Product | Faraz Store</title>

<link rel="stylesheet" href="css/admin-add-product.css">

</head>

<body>

<div class="admin-box">

<h1>➕ Add New Product</h1>

<div class="form-box">

<input id="name" type="text" placeholder="Product Name">

<input id="price" type="number" placeholder="Product Price">

<input id="image" type="text" placeholder="Image URL">

<input id="category" type="text" placeholder="Category">

<!-- New Stock Input -->
<input id="stock" type="number" placeholder="Available Stock" min="0" value="0">

<textarea id="description" placeholder="Product Description"></textarea>

<button id="add-product">
Add Product
</button>

<p id="message"></p>

</div>

</div>

<script type="module" src="js/admin-add-product.js"></script>

</body>

</html>
