<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Faraz Store</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- Premium Fullscreen Flex Wrapper for User Login -->
    <section class="user-login-page">
        
        <div class="user-login-card">
            <div class="user-login-header">
                <h1>⚡ FARAZ <span>STORE</span></h1>
                <p>CUSTOMER ACCESS PORTAL</p>
            </div>

            <!-- Form Groups Input Field Blocks -->
            <div class="user-input-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" placeholder="Enter your email" autocomplete="off">
            </div>

            <div class="user-input-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••">
            </div>

            <!-- Full-width Neon Action Login Trigger -->
            <button id="login-btn" class="user-submit-btn">
                Sign In
            </button>

            <!-- Footer Redirection Links Layout -->
            <p class="user-login-footer-links">
                New to the store? 
                <a href="signup.html">Create Account</a>
            </p>
        </div>

    </section>

    <!-- Core auth tracking module engine -->
    <script type="module" src="js/auth.js"></script>

</body>
</html>
